services:
  web:
    build: .
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      SQLITE_PATH: /app/data/blog.db
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 证书文件挂载（部署时取消注释并修改路径）
      # - /etc/letsencrypt/live/你的域名/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      # - /etc/letsencrypt/live/你的域名/privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  sqlite-data:
