# 示例：在服务器「宿主机」安装 Nginx + HTTPS 时，反代到本机上的 Flask 端口。
# 复制为例如 /etc/nginx/sites-available/blog 后修改 server_name 与证书路径。
#
# 前提：在 docker-compose.yml 的 web 服务下增加仅本机绑定，例如：
#   ports:
#     - "127.0.0.1:8080:8080"
# 这样宿主机 Nginx 可访问 127.0.0.1:8080，公网仍只暴露 443（由宿主机 Nginx 监听）。

upstream flask_local {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    server_name blog.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blog.example.com;

    ssl_certificate     /etc/letsencrypt/live/blog.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.example.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://flask_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
