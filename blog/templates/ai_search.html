{% extends "base.html" %}
{% block title %}AI 智能搜索{% endblock %}
{% block extra_head %}
<style>
.ai-search-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1rem;
}
.ai-search-header {
    text-align: center;
    margin-bottom: 2rem;
}
.ai-search-header h1 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(120deg, #2c4a7c, #4b6a9b);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}
.ai-search-header p {
    color: var(--muted);
    font-size: 0.95rem;
}
.search-box {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
}
.search-box input {
    flex: 1;
    padding: 0.85rem 1.2rem;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 1rem;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
}
.search-box input:focus {
    border-color: var(--accent);
}
.search-box button {
    padding: 0.85rem 1.5rem;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #2c4a7c, #3d5a8a);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
}
.search-box button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(44, 74, 124, 0.25);
}
.search-box button:disabled {
    opacity: 0.6;
    cursor: wait;
}
.ai-summary {
    background: linear-gradient(135deg, #f0f4ff, #e8eefc);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    border-left: 4px solid var(--accent);
    font-size: 0.95rem;
    color: #2c3e66;
    line-height: 1.6;
}
.ai-summary strong {
    color: var(--accent);
}
.keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
}
.keywords .kw {
    font-size: 0.78rem;
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
    background: rgba(44, 74, 124, 0.08);
    color: var(--accent);
}
.result-item {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 1.25rem;
    margin-bottom: 1rem;
    transition: transform 0.15s, box-shadow 0.15s;
}
.result-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 36px rgba(20, 30, 55, 0.12);
}
.result-item .type-badge {
    display: inline-block;
    font-size: 0.72rem;
    padding: 0.15rem 0.5rem;
    border-radius: 6px;
    margin-bottom: 0.5rem;
    font-weight: 600;
}
.result-item .type-badge.note {
    background: rgba(44, 74, 124, 0.1);
    color: var(--accent);
}
.result-item .type-badge.project {
    background: rgba(26, 127, 55, 0.1);
    color: #1a7f37;
}
.result-item h3 {
    margin: 0 0 0.4rem;
    font-size: 1.1rem;
}
.result-item h3 a {
    color: var(--text);
}
.result-item .summary {
    color: var(--muted);
    font-size: 0.92rem;
    margin: 0 0 0.5rem;
    line-height: 1.5;
}
.result-item .ai-explanation {
    font-size: 0.85rem;
    color: #5c6f96;
    background: rgba(44, 74, 124, 0.04);
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    margin-top: 0.5rem;
}
.result-item .ai-explanation::before {
    content: "🤖 ";
}
.result-item .tags {
    margin-top: 0.5rem;
}
.empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
}
.empty-state .icon {
    font-size: 3rem;
    margin-bottom: 1rem;
}
.loading {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
}
.loading .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2px solid rgba(44, 74, 124, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 0.5rem;
    vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
{% endblock %}
{% block content %}
<div class="ai-search-container">
    <div class="ai-search-header">
        <h1>🔍 AI 智能搜索</h1>
        <p>用自然语言搜索你的学习笔记和项目，AI 帮你找到最相关的内容</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="例如：Docker 部署 Flask 应用的方法" onkeydown="if(event.key==='Enter') doSearch()">
        <button id="searchBtn" onclick="doSearch()">搜索</button>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const resultsArea = document.getElementById("resultsArea");

async function doSearch() {
    const query = searchInput.value.trim();
    if (!query) return;

    searchBtn.disabled = true;
    searchBtn.textContent = "搜索中...";
    resultsArea.innerHTML = '<div class="loading"><span class="spinner"></span>AI 正在分析你的问题...</div>';

    try {
        const res = await fetch("/api/ai/search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ q: query }),
        });
        const data = await res.json();

        if (data.error) {
            resultsArea.innerHTML = `<div class="empty-state"><p>❌ ${data.error}</p></div>`;
            return;
        }

        renderResults(data);
    } catch (err) {
        resultsArea.innerHTML = `<div class="empty-state"><p>❌ 请求失败: ${err.message}</p></div>`;
    } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = "搜索";
    }
}

function renderResults(data) {
    let html = "";

    if (data.keywords && data.keywords.length > 0) {
        html += '<div class="keywords">';
        html += '<span style="font-size:0.8rem;color:var(--muted);margin-right:0.3rem">关键词:</span>';
        data.keywords.forEach(kw => {
            html += `<span class="kw">${escapeHtml(kw)}</span>`;
        });
        html += "</div>";
    }

    if (data.ai_summary) {
        html += `<div class="ai-summary"><strong>💡 AI 解读：</strong>${escapeHtml(data.ai_summary)}</div>`;
    }

    if (!data.results || data.results.length === 0) {
        html += `<div class="empty-state"><div class="icon">🔍</div><p>没有找到相关内容，试试换个说法？</p></div>`;
    } else {
        data.results.forEach(r => {
            const typeLabel = r.type === "note" ? "笔记" : "项目";
            const typeClass = r.type === "note" ? "note" : "project";
            const url = r.type === "note" ? `/notes/${r.slug}` : `/projects/${r.slug}`;
            const tagsHtml = r.tags && r.tags.length > 0
                ? `<div class="tags">${r.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>`
                : "";
            const aiExpHtml = r.ai_explanation
                ? `<div class="ai-explanation">${escapeHtml(r.ai_explanation)}</div>`
                : "";

            html += `
            <div class="result-item">
                <span class="type-badge ${typeClass}">${typeLabel}</span>
                <h3><a href="${url}">${escapeHtml(r.title)}</a></h3>
                <p class="summary">${escapeHtml(r.summary)}</p>
                ${tagsHtml}
                ${aiExpHtml}
            </div>`;
        });
    }

    resultsArea.innerHTML = html;
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
