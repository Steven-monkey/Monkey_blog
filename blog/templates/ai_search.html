{% extends "base.html" %}
{% block title %}AI 智能搜索{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/ai-search.css') }}">
{% endblock %}
{% block content %}
<div class="ai-search-container">
    <div class="ai-search-header">
        <h1>AI 智能搜索</h1>
        <p>用自然语言搜索你的学习笔记和项目，AI 帮你找到最相关的内容</p>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="例如：Docker 部署 Flask 应用的方法" onkeydown="if(event.key==='Enter') doSearch()">
        <button id="searchBtn" onclick="doSearch()">搜索</button>
    </div>
    <div id="resultsArea"></div>
</div>
<script src="{{ url_for('static', filename='js/ai-search.js') }}"></script>
{% endblock %}
