{% extends "base.html" %}
{% block title %}智慧箴言 · AI{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/wisdom.css') }}">
<style>
    .page-main { max-width: none !important; padding: 0 !important; }
</style>
{% endblock %}
{% block content %}
<div class="wisdom-standalone">
<div class="wisdom-card" id="wisdomCard">
    <div class="card-header">
        <div class="wisdom-title"><span>✨</span> 智慧箴言</div>
        <div class="live-clock" id="liveClock">加载时间...</div>
    </div>

    <div class="quote-container" id="quoteContainer">
        <div class="scene-wrapper">
            <img
                class="scene-image"
                id="sceneImage"
                src="https://image.pollinations.ai/prompt/%E6%9F%94%E5%92%8C%E6%99%A8%E5%85%89%EF%BC%8C%E6%9E%97%E9%97%B4%E8%96%84%E9%9B%BE%EF%BC%8C%E7%A6%85%E6%84%8F%E6%84%8F%E5%A2%83%EF%BC%8C%E7%AB%96%E5%B1%8F%E8%83%8C%E6%99%AF%E5%9B%BE?width=1080&height=1920&nologo=true&enhance=true&safe=true"
                alt="与箴言意境呼应的背景图"
                loading="lazy"
            >
            <div class="scene-tag">9:16 · 1080x1920</div>
        </div>
        <div class="quote-icon">"</div>
        <div class="quote-text" id="quoteText">每一个微小进步，都值得热烈鼓掌。</div>
        <div class="quote-author" id="quoteAuthor">—— 灵境回声</div>
    </div>

    <div class="button-group">
        <button type="button" class="wisdom-btn wisdom-btn-primary" id="localQuoteBtn">🌿 经典箴言库</button>
        <button type="button" class="wisdom-btn wisdom-btn-accent" id="deepseekQuoteBtn">🌐 AI 全球箴言</button>
        <button type="button" class="wisdom-btn wisdom-btn-primary" id="downloadImageBtn">⬇️ 下载背景图</button>
        <button type="button" class="wisdom-btn wisdom-btn-primary" id="downloadPosterBtn">🖼️ 下载箴言海报</button>
    </div>

    <div class="api-section">
        <div class="api-status" id="apiStatusDisplay">🔍 正在检查后端配置...</div>
        <button type="button" class="mini-btn" id="refreshStatusBtn">🔄 刷新状态</button>
    </div>

    <div class="status-tip" id="statusTip"></div>

    <div class="wisdom-footer-note">
        <span>🌍 收录全球哲思</span>
        <span>🧠 AI 智慧引擎</span>
        <span>📜 经典·原创·洞见</span>
    </div>
</div>
</div>
<script src="{{ url_for('static', filename='js/wisdom.js') }}"></script>
{% endblock %}
