{% extends "base.html" %}
{% block title %}笔记 · 个人博客{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/timeline.css') }}">
{% endblock %}
{% block content %}
{% from "macros/timeline.html" import timeline %}

<section class="hero">
    <h1 class="gradient-text">学习笔记</h1>
    <p>记录学习过程中的思考与实践。</p>
</section>

{% if items %}
{{ timeline(items, item_type="note") }}
{% else %}
<p class="empty">暂无笔记</p>
{% endif %}
{% endblock %}
