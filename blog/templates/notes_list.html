{% extends "base.html" %}
{% block title %}笔记列表 · 个人博客{% endblock %}
{% block content %}
{% from "macros/cards.html" import card_grid %}

<section class="hero">
    <h1>学习笔记</h1>
    <p>记录学习过程中的思考与实践。</p>
</section>

{% if items %}
{{ card_grid(items, item_type="note") }}
{% else %}
<p class="empty">暂无笔记，请在 <code>content/notes/</code> 添加 Markdown 后重启服务。</p>
{% endif %}
{% endblock %}
